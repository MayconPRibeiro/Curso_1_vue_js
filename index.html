<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=scri, initial-scale=1.0" />
    <title>Titulo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>

    <div id="app">
      <h1>{{titulo}}</h1>
      <br />

      <img
        :src="'https://ingresso-a.akamaihd.net/prd/img/movie/devoradores-de-estrelas/07cc713e-78be-44fe-892a-bb74c20caac4.webp'"
        :alt="'texto'"
        :style="{width:'30%'}"
      />
      <br />

      <label for="">Nome</label>
      <input type="text" v-model="nome" />
      <br />

      <label for="">Telefone</label>
      <input type="text" v-model="telefone" />
      <br />

      <label for="">Deseja receber nossa novidades?</label>
      <input type="radio" v-model="novidades" value="sim" />sim
      <input type="radio" v-model="novidades" value="nao" />nao
      <br />

      <label for="">Quais esportes prefere?</label>
      <br />
      <input type="checkbox" v-model="interesses" value="Futebol" /> Futebol
      <br />
      <input type="checkbox" v-model="interesses" value="Basquete" /> Basquete
      <br />
      <input type="checkbox" v-model="interesses" value="Volei" /> Volei
      <br />

      <label for="">Como nos conheceu?</label>
      <select v-model="conheceu">
        <option value="Google">Google</option>
        <option value="Facebook">Facebook</option>
        <option value="Instagram">Instagram</option>
        <option value="Outro">Outro</option></select
      ><br />

      <button type="button" v-bind:class="btnClassLimpar">Limpar</button>
      <button type="button" v-bind:class="btnClassEnviar">Enviar</button>

      <div v-if="nome">
        Nome = {{nome}}<br />
        Telefone = {{telefone}}<br />
        Novidades = {{novidades}}<br />
        Interesses = {{interesses}}<br />
        Como nos conheceu = {{conheceu}}
      </div>
    </div>

    <script>
      var app = new Vue({
        el: "#app",
        data: {
          titulo: "Formulário",
          nome: "",
          telefone: "",
          novidades: "",
          interesses: [],
          conheceu: "",
          btnClassEnviar: {
            btn: true,
            "btn-outline-primary": true,
          }, //fim do objeto btnClasseEnviar - Foi utilizado como objeto
          btnClassLimpar: ["btn", "btn-outline-danger"], // Fim do objeto btnClasseLimpar - Foi utilizado como array
        },
      });
    </script>
  </body>
</html>
