<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=scri, initial-scale=1.0" />
    <title>Titulo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>

    <div id="app" :style="divApp">
      <h1>{{titulo}}</h1>
      <br />

      <img
        :src="'https://ingresso-a.akamaihd.net/prd/img/movie/devoradores-de-estrelas/07cc713e-78be-44fe-892a-bb74c20caac4.webp'"
        :alt="'texto'"
        :style="{width:'30%'}"
      />
      <br /><br />

      <form @submit.prevent="enviar()">
        <label for="nome">Nome</label>
        <input
          id="nome"
          type="text"
          placeholder="Digite seu nome"
          v-model="nome"
          required
        />
        <br /><br />

        <label for="telefone">Telefone</label>
        <input
          id="telefone"
          type="tel"
          placeholder="11 999999999"
          v-model="telefone"
          pattern="[0-9]{2} [0-9]{9}"
          title="Digite o DDD e o telefone - exemplo: 11 999999999"
          required
        />
        <br /><br />

        <fieldset>
          <label>Deseja receber nossa novidades?</label>

          <input
            id="sim"
            type="radio"
            v-model="novidades"
            value="sim"
            name="news"
            required
          />
          <label for="sim">SIM</label>

          <input
            id="nao"
            type="radio"
            v-model="novidades"
            value="nao"
            name="news"
          />
          <label for="nao">NÃO</label>
          <br /><br />
        </fieldset>

        <fieldset>
          <label>Quais esportes prefere?</label>
          <br />
          <input
            id="futebol"
            type="checkbox"
            v-model="interesses"
            value="Futebol"
          />
          <label for="futebol">Futebol</label>
          <br />
          <input
            id="basquete"
            type="checkbox"
            v-model="interesses"
            value="Basquete"
          />
          <label for="basquete">Basquete</label>
          <br />
          <input
            id="volei"
            type="checkbox"
            v-model="interesses"
            value="Volei"
          />
          <label for="volei">Volei</label>
          <br /><br />
        </fieldset>

        <label for="conheceu">Como nos conheceu?</label>
        <select id="conheceu" v-model="conheceu">
          <option value="">Selecione</option>
          <option value="Google">Google</option>
          <option value="Facebook">Facebook</option>
          <option value="Instagram">Instagram</option>
          <option value="Outro">Outro</option></select
        ><br /><br />

        <button
          type="button"
          :class="btnClassLimpar"
          :style="btnStyleEnviarLimpar"
          @click="limpar()"
        >
          Limpar
        </button>
        <button
          type="submit"
          :class="btnClassEnviar"
          :style="btnStyleEnviarLimpar"
        >
          Enviar
        </button>
      </form>
      <br />

      <div v-if="nome">
        Nome = {{nome}}<br />
        Telefone = {{telefone}}<br />
        Novidades = {{novidades}}<br />
        Interesses = {{interesses}}<br />
        Como nos conheceu = {{conheceu}}
      </div>

      <div :style="listaStyleUsuarios">
        <ul>
          <li v-for="usuario in usuarios">
            {{ usuario.nome | toUpperCase() | primeiroNome}}
          </li>
        </ul>
      </div>
    </div>

    <script>
      var app = new Vue({
        el: "#app",
        data: {
          titulo: "Formulário",
          nome: "",
          telefone: "",
          novidades: "",
          interesses: [],
          conheceu: "",

          usuarios: [
            { nome: "João Alves" },
            { nome: "Maria dos santos" },
            { nome: "João José da silva" },
          ],

          listaStyleUsuarios: {
            "text-align": "left",
          },

          btnClassEnviar: {
            btn: true,
            "btn-outline-primary": true,
          }, //fim do objeto btnClasseEnviar - Foi utilizado como objeto

          btnClassLimpar: ["btn", "btn-outline-danger"], // Fim do objeto btnClasseLimpar - Foi utilizado como array

          btnStyleEnviarLimpar: {
            "font-size": "15px",
            "font-weight": "bold",
          }, //fim do style para btnStyleEnviarLimpar

          divApp: {
            "text-align": "center",
          }, //fim do style para divApp
        },

        methods: {
          enviar() {
            alert("Enviado com sucesso");
          }, //funçaõ enviar
          limpar() {
            this.nome = "";
            this.telefone = "";
            this.novidades = "";
            this.interesses = [];
            this.conheceu = "";
          }, // função limpar todos os dados do formulário
        }, //Fim methods

        filters: {
          toUpperCase(str) {
            return str.toUpperCase();
          },

          primeiroNome(str) {
            return str.split(" ")[0];
          },
        },
      });
    </script>
  </body>
</html>
