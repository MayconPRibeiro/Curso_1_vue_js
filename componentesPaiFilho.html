<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>

    <div id="app">
      <h1>{{ titulo }}</h1>

      <meu-filho :titulo="titulo"></meu-filho>
    </div>

    <script>
      Vue.component('meu-filho', {
        props: ['titulo'], // Recebe o dado do pai
        template: '<div><h2>Filho: {{ titulo }}</h2></div>'
      });

      var app = new Vue({
        el: "#app",
        data: {
          titulo: "Treinar Componente Pai e filho",
        },
      });
    </script>
  </body>
</html>
