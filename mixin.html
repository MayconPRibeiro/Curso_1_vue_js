<!doctype html>
<html lang="en">

    <title>Document</title>
  </head>

    </div>

    <script>

        methods: {
          get_users() {
            console.log("get users funcionando");

        mixins: [mixin],

        data: {
          titulo: "Vue js",
        },
      });
    </script>
  </body>
</html>
