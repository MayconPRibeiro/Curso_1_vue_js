<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="app">
      <button @click.stop.prevent="get_users()">Buscar Usuários</button>

      <div>{{titulo}}</div>

      <div>
        <ul>
          <li v-for="user in users">{{ user.name }}</li>
        </ul>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>

    <!--Chamando vue resource para requisições ajax-->
    <script src="https://cdn.jsdelivr.net/npm/vue-resource@1.5.3"></script>

    <!--Chamando axios para requisições ajax-->
    <script src="https://unpkg.com/axios@1.13.2/dist/axios.min.js"></script>

    <script>
      var mixin = {
        methods: {
          /* Usando Vue Resource
          get_users() {
            var url_api = "http://jsonplaceholder.typicode.com/users";

            this.$http.get(url_api).then((response) => {
              this.users = response.body;
            });
          }, */

          //Usando Axios
          get_users() {
            axios
              .get("http://jsonplaceholder.typicode.com/users")
              .then((response) => {
                this.users = response.data;
              });
          },
        },
      };

      var app = new Vue({
        el: "#app",

        mixins: [mixin],

        data: {
          titulo: "Vue js",
          users: [],
        },
      });
    </script>
  </body>
</html>
